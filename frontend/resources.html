<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Resources – FutureMap AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }
    .resource-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 22px;
      transition: all 0.3s;
      display: flex; flex-direction: column;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
    }
    .resource-card:hover {
      border-color: var(--accent-primary);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(108,99,255,0.18);
    }
    .r-type-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      font-weight: 700; padding: 4px 10px; border-radius: 20px;
      align-self: flex-start;
    }
    .r-course { background: rgba(108,99,255,0.12); color: var(--accent-primary); }
    .r-youtube { background: rgba(255,79,79,0.12); color: #ff4f4f; }
    .r-docs { background: rgba(0,212,255,0.1); color: var(--accent-secondary); }
    .r-platform { background: rgba(0,229,160,0.1); color: var(--accent-green); }
    .r-blog { background: rgba(255,120,73,0.1); color: var(--accent-orange); }
    .r-title { font-weight: 700; font-size: 15px; line-height: 1.3; }
    .r-provider { font-size: 12px; color: var(--text-muted); }
    .r-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .r-arrow { margin-top: auto; color: var(--text-muted); font-size: 13px; }
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(108,99,255,0.1);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="page-title">📚 Learning Resources</div>
    </header>

    <main class="page-content">
      <!-- Hero -->
      <div class="card" style="margin-bottom:28px;background:linear-gradient(135deg,rgba(0,229,160,0.08),rgba(0,212,255,0.06));border-color:rgba(0,229,160,0.2)">
        <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
          <div style="font-size:52px">📚</div>
          <div>
            <h2 style="font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-0.02em;margin-bottom:6px">Curated Learning Resources</h2>
            <p style="color:var(--text-secondary);font-size:14px">Top courses, YouTube channels, and documentation for every career path</p>
          </div>
          <a href="predict.html" class="btn btn-primary" style="margin-left:auto">⚡ Get Personalized Resources</a>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterResources('all', this)">All</button>
        <button class="filter-btn" onclick="filterResources('Course', this)">🎓 Courses</button>
        <button class="filter-btn" onclick="filterResources('YouTube', this)">▶️ YouTube</button>
        <button class="filter-btn" onclick="filterResources('Docs', this)">📄 Docs</button>
        <button class="filter-btn" onclick="filterResources('Platform', this)">🖥️ Platforms</button>
      </div>

      <!-- Resources grid -->
      <div class="resource-grid" id="resourceGrid"></div>
    </main>
  </div>
</div>

<script src="js/sidebar.js"></script>
<script src="js/auth.js"></script>
<script>
  document.getElementById('sidebar').innerHTML = renderSidebar('resources.html');

  const ALL_RESOURCES = [
    { type:'Course', title:'Machine Learning by Andrew Ng', provider:'Coursera', desc:'The most popular ML course ever. Perfect for beginners starting their AI journey.', url:'https://www.coursera.org/learn/machine-learning', career:'AI / Data Science', icon:'🤖' },
    { type:'Course', title:'Deep Learning Specialization', provider:'Coursera / deeplearning.ai', desc:'5-course specialization covering neural networks, CNNs, RNNs, and more.', url:'https://www.coursera.org/specializations/deep-learning', career:'AI Engineer', icon:'🧠' },
    { type:'YouTube', title:'Krish Naik', provider:'YouTube', desc:'Best Hindi/English ML & Data Science tutorials. Projects, theory, and interviews.', url:'https://www.youtube.com/@krishnaik06', career:'AI / Data Science', icon:'🎥' },
    { type:'YouTube', title:'Sentdex', provider:'YouTube', desc:'Python, ML, finance, and robotics projects with practical code examples.', url:'https://www.youtube.com/@sentdex', career:'Data Science', icon:'🐍' },
    { type:'YouTube', title:'Traversy Media', provider:'YouTube', desc:'Best web development tutorials covering HTML, CSS, JS, React, Node.js and more.', url:'https://www.youtube.com/@TraversyMedia', career:'Full Stack / Frontend', icon:'💻' },
    { type:'YouTube', title:'TechWorld with Nana', provider:'YouTube', desc:'DevOps tutorials: Docker, Kubernetes, CI/CD pipelines, Terraform, and AWS.', url:'https://www.youtube.com/@TechWorldwithNana', career:'DevOps', icon:'🔧' },
    { type:'YouTube', title:'Philipp Lackner', provider:'YouTube', desc:'Best Android + Kotlin tutorials with clean architecture and modern patterns.', url:'https://www.youtube.com/@PhilippLackner', career:'Android Developer', icon:'📱' },
    { type:'YouTube', title:'Alex The Analyst', provider:'YouTube', desc:'SQL, Excel, Power BI, Tableau for data analytics beginners and professionals.', url:'https://www.youtube.com/@AlexTheAnalyst', career:'Data Analyst', icon:'📊' },
    { type:'YouTube', title:'NetworkChuck', provider:'YouTube', desc:'Cybersecurity, networking, Linux, ethical hacking made fun and accessible.', url:'https://www.youtube.com/@NetworkChuck', career:'Cybersecurity', icon:'🔐' },
    { type:'Course', title:'Full Stack Open', provider:'University of Helsinki', desc:'Free, comprehensive full stack development course from a top university.', url:'https://fullstackopen.com', career:'Full Stack Developer', icon:'🌐' },
    { type:'Platform', title:'Kaggle Learn', provider:'Kaggle', desc:'Free micro-courses on ML, Python, SQL, data viz. Includes competitions.', url:'https://www.kaggle.com/learn', career:'Data Science', icon:'🏆' },
    { type:'Platform', title:'TryHackMe', provider:'TryHackMe', desc:'Gamified cybersecurity training with real-world labs and challenges.', url:'https://tryhackme.com', career:'Cybersecurity', icon:'🕵️' },
    { type:'Platform', title:'KodeKloud', provider:'KodeKloud', desc:'Hands-on DevOps labs for Docker, Kubernetes, Ansible, Terraform and more.', url:'https://kodekloud.com', career:'DevOps', icon:'⚙️' },
    { type:'Docs', title:'HuggingFace NLP Course', provider:'HuggingFace', desc:'Official free course to learn transformers, BERT, and fine-tuning LLMs.', url:'https://huggingface.co/learn/nlp-course', career:'NLP Engineer', icon:'🤗' },
    { type:'Docs', title:'Android Developers Docs', provider:'Google', desc:'Official Android documentation for Kotlin, Jetpack Compose, and more.', url:'https://developer.android.com', career:'Android Developer', icon:'📱' },
    { type:'Course', title:'Google UX Design Certificate', provider:'Coursera', desc:'7-course professional certificate covering UX research, Figma, and prototyping.', url:'https://www.coursera.org/professional-certificates/google-ux-design', career:'UI/UX Designer', icon:'✏️' },
    { type:'Docs', title:'JavaScript.info', provider:'Free', desc:'The most complete and modern JavaScript reference and tutorial on the internet.', url:'https://javascript.info', career:'Frontend / Full Stack', icon:'📜' },
    { type:'Platform', title:'fast.ai', provider:'fast.ai', desc:'Top-down practical deep learning approach. Free and incredibly effective.', url:'https://www.fast.ai', career:'AI Engineer', icon:'🚀' },
    { type:'Course', title:'AWS Training & Certification', provider:'AWS', desc:'Official Amazon training for cloud certifications: Solutions Architect, Developer, etc.', url:'https://aws.amazon.com/training', career:'Cloud Architect', icon:'☁️' },
    { type:'Platform', title:'CryptoZombies', provider:'Free', desc:'Interactive Solidity coding game to learn Ethereum smart contract development.', url:'https://cryptozombies.io', career:'Blockchain Developer', icon:'⛓️' },
    { type:'Blog', title:'PyImageSearch', provider:'Free/Paid', desc:'Computer vision and deep learning tutorials using OpenCV and PyTorch.', url:'https://pyimagesearch.com', career:'Computer Vision', icon:'👁️' },
    { type:'Docs', title:'Hacking with Swift', provider:'Free', desc:'Complete free resource for learning Swift and iOS app development from scratch.', url:'https://www.hackingwithswift.com', career:'iOS Developer', icon:'🍎' },
    { type:'YouTube', title:'Kevin Powell (CSS)', provider:'YouTube', desc:'The best CSS teacher on YouTube. Responsive design, animations, and modern CSS.', url:'https://www.youtube.com/@KevinPowell', career:'Frontend Developer', icon:'🎨' },
    { type:'Course', title:'Data Science Specialization', provider:'Johns Hopkins / Coursera', desc:'10-course sequence covering R, stats, ML, and the complete data science workflow.', url:'https://www.coursera.org/specializations/jhu-data-science', career:'Data Scientist', icon:'📊' },
  ];

  let currentFilter = 'all';

  function filterResources(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderResources();
  }

  function renderResources() {
    const filtered = currentFilter === 'all'
      ? ALL_RESOURCES
      : ALL_RESOURCES.filter(r => r.type === currentFilter);

    const typeClass = { Course:'r-course', YouTube:'r-youtube', Docs:'r-docs', Platform:'r-platform', Blog:'r-blog' };

    document.getElementById('resourceGrid').innerHTML = filtered.map(r => `
      <a class="resource-card" href="${r.url}" target="_blank">
        <span class="r-type-badge ${typeClass[r.type] || 'r-course'}">${r.type === 'YouTube' ? '▶️' : r.type === 'Course' ? '🎓' : r.type === 'Docs' ? '📄' : r.type === 'Platform' ? '🖥️' : '📝'} ${r.type}</span>
        <div class="r-title">${r.icon} ${r.title}</div>
        <div class="r-provider">by ${r.provider} · ${r.career}</div>
        <div class="r-desc">${r.desc}</div>
        <div class="r-arrow">Open resource →</div>
      </a>
    `).join('');
  }

  renderResources();
</script>
<script src="js/theme.js"></script>
</body>
</html>
